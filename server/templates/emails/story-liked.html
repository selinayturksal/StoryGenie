<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hikayene Beğeni Geldi!</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f0ff;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f0ff;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(117,50,70,0.10);">

          <!-- Üst başlık -->
          <tr>
            <td style="background:linear-gradient(135deg,#753246,#50267a);padding:36px 40px;text-align:center;">
              <div style="font-size:48px;margin-bottom:12px;">💖</div>
              <div style="color:#ffffff;font-size:26px;font-weight:800;letter-spacing:1px;">MasalMatik</div>
              <div style="color:rgba(255,255,255,0.75);font-size:14px;margin-top:4px;">Topluluk Bildirimi</div>
            </td>
          </tr>

          <!-- Ana içerik -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <h1 style="margin:0 0 16px;font-size:20px;color:#2d1b4e;font-weight:800;">
                Merhaba, {{ownerUsername}} 👋
              </h1>
              <p style="margin:0 0 24px;font-size:15px;color:#4a3060;line-height:1.7;">
                Harika haber! Topluluğumuzdan biri masalını çok sevdi 🎉
              </p>

              <!-- Beğeni kutusu -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td style="background:#fff0f8;border:1.5px solid #ffb0d8;border-radius:16px;padding:20px 24px;text-align:center;">
                    <div style="font-size:32px;margin-bottom:8px;">💖</div>
                    <p style="margin:0 0 4px;font-size:16px;font-weight:800;color:#753246;">
                      {{likerName}}
                    </p>
                    <p style="margin:0;font-size:13px;color:#9b5070;">
                      şu masalını beğendi:
                    </p>
                    <p style="margin:12px 0 0;font-size:15px;font-weight:800;color:#2d1b4e;
                              background:#ffffff;padding:10px 16px;border-radius:10px;display:inline-block;">
                      📖 "{{storyTitle}}"
                    </p>
                  </td>
                </tr>
              </table>

              <!-- CTA Butonu -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{storyUrl}}"
                       style="display:inline-block;background:linear-gradient(135deg,#753246,#50267a);color:#ffffff;
                              text-decoration:none;font-size:15px;font-weight:800;padding:14px 36px;
                              border-radius:50px;box-shadow:0 4px 16px rgba(117,50,70,0.35);">
                      📖 Hikayeyi Görüntüle
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9f5ff;padding:24px 40px;border-top:1px solid #ede8f5;text-align:center;">
              <p style="margin:0;font-size:12px;color:#9b8ab0;line-height:1.6;">
                Bu mail MasalMatik tarafından gönderildi.<br/>
                Bildirimleri <a href="{{appUrl}}/settings" style="color:#753246;text-decoration:none;">ayarlar sayfasından</a> değiştirebilirsiniz.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
